<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for Saumya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="bouquet-wrapper">
            <img src="bouquet.png" alt="Flowers" class="bouquet-static">
        </div>

        <div class="envelope-wrapper" id="letter-btn">
            <div class="letter-preview">
                <p>To: Saumya</p>
                <small>Click to open</small>
            </div>
        </div>

        <div id="secret-message" class="hidden">
            <div class="message-paper">
                <h1>Good Luck, Saumya! 🌸</h1>
                <p>Sending you strength for your vaccine today. I hope it goes smoothly with no bad reactions at all!</p>
                <p><strong>Rest up and stay hydrated.</strong></p>
                <p>You've got this! ❤️</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
