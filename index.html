<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for you, Saumya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="bouquet-container">
            <img src="bouquet.png" alt="Flowers for Saumya" class="bouquet-wave">
        </div>

        <div class="envelope-wrapper" id="letter-btn">
            <div class="letter-preview">
                <p>To: Saumya</p>
                <small>(Click to open)</small>
            </div>
        </div>

        <div id="secret-message" class="hidden">
            <div class="message-paper">
                <h1>Stay Strong, Saumya! 🌸</h1>
                <p>Sending you all the positive vibes for your vaccine today.</p>
                <p><strong>I hope it's a breeze and you feel perfectly fine afterward!</strong></p>
                <p>Take it easy, stay hydrated, and remember you're doing great. ❤️</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
