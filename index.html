<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for Saumya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stage">
        <div id="interaction-group">
            
            <div class="bouquet-container">
                <img src="bouquet.png" alt="Flowers for Saumya" class="bouquet-static">
            </div>
            
            <div class="envelope-card" id="envelope-btn">
                <div class="wax-seal">S</div>
                <div class="envelope-text">
                    <p>To: Saumya</p>
                    <small>Click to open</small>
                </div>
            </div>
        </div>

        <div id="message-paper" class="hidden">
            <div class="paper-texture">
                <h1>Thinking of You!</h1>
                <p>Sending you strength and a very smooth vaccine experience today, Saumya.</p>
                <p><strong>I hope it's quick and you have no reactions at all!</strong></p>
                <p>Rest up, stay hydrated, and know I'm rooting for you. 🌸❤️</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
