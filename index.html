<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for Saumya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-viewport">
        
        <div class="envelope-container" id="envelope-interactive">
            
            <div class="envelope-back"></div>
            
            <div class="bouquet-hold">
                <img src="bouquet.png" alt="Flowers for Saumya" class="real-wind-bouquet">
            </div>
            
            <div class="envelope-front">
                <div class="wax-seal">S</div>
                <div class="click-prompt">To: Saumya</div>
            </div>
        </div>

        <div id="message-paper" class="hidden">
            <div class="paper-texture">
                <h1>Thinking of You!</h1>
                <p>Sending strength and so much love for your vaccine appointment today, Saumya.</p>
                <p><strong>I hope it is quick, painless, and that you feel perfectly fine!</strong></p>
                <p>Rest up, drink lots of water, and treat yourself well. You've got this! 🌸❤️</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
